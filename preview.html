<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品数据预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px 20px;
      background: #1a1a1a;
      border: 2px solid #ffd700;
      border-radius: 8px;
    }

    .header-left {
      font-size: 16px;
    }

    .header-right {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border: 2px solid #ffd700;
      background: transparent;
      color: #ffd700;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #ffd700;
      color: #000;
    }

    .btn.primary {
      background: #ffd700;
      color: #000;
    }

    .btn.primary:hover {
      background: #ffed4a;
    }

    .pagination {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .pagination span {
      color: #ffd700;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
      border: 2px solid #ffd700;
      border-radius: 8px;
    }

    .product-card {
      position: relative;
      background: #1a1a1a;
      border: 2px solid #ffd700;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
    }

    .checkbox-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }

    .checkbox-container input {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #ffd700;
    }

    .product-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #333;
    }

    .product-info {
      padding: 15px;
    }

    .product-title {
      font-size: 14px;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-size: 18px;
      font-weight: bold;
      color: #ffd700;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding: 15px 20px;
      background: #1a1a1a;
      border: 2px solid #ffd700;
      border-radius: 8px;
    }

    .no-data {
      text-align: center;
      padding: 50px;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span id="totalCount">数据预览（共0条）</span>
      <span id="selectedCount" style="margin-left: 20px;">已选择0条</span>
    </div>
    <div class="header-right">
      <button class="btn" onclick="selectAll()">全选</button>
      <button class="btn" onclick="unselectAll()">取消全选</button>
      <button class="btn" onclick="invertSelection()">反选</button>
      <button class="btn" onclick="deleteSelected()">删除选中</button>
    </div>
  </div>

  <div id="productGrid" class="product-grid">
    <div class="no-data">暂无数据</div>
  </div>

  <div class="footer">
    <div class="pagination">
      <button class="btn" onclick="goToFirstPage()" id="firstPageBtn">首页</button>
      <button class="btn" onclick="goToPrevPage()" id="prevPageBtn">上一页</button>
      <span id="pageInfo">第1/1页（1-0）</span>
      <button class="btn" onclick="goToNextPage()" id="nextPageBtn">下一页</button>
      <button class="btn" onclick="goToLastPage()" id="lastPageBtn">最后页</button>
    </div>
    <button class="btn primary" onclick="exportData()">导出</button>
  </div>

  <script>
    let products = [];
    let selectedIds = new Set();
    let currentPage = 1;
    const pageSize = 20;

    function loadProducts() {
      const urlParams = new URLSearchParams(window.location.search);
      const productsJson = urlParams.get('data');
      if (productsJson) {
        products = JSON.parse(decodeURIComponent(productsJson));
        renderProducts();
      }
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      
      if (products.length === 0) {
        grid.innerHTML = '<div class="no-data">暂无数据</div>';
        updateCount();
        updatePageInfo();
        return;
      }

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageProducts = products.slice(start, end);

      grid.innerHTML = pageProducts.map((product, index) => {
        const globalIndex = start + index;
        const isSelected = selectedIds.has(globalIndex);
        return `
          <div class="product-card" data-index="${globalIndex}">
            <div class="checkbox-container">
              <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${globalIndex})" />
            </div>
            <img src="${product.imageUrl}" alt="${product.title}" class="product-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27200%27 height=%27200%27%3E%3Crect fill=%27%23333%27 width=%27200%27 height=%27200%27/%3E%3Ctext fill=%27%23666%27 font-size=%2714%27 x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27%3E图片加载失败%3C/text%3E%3C/svg%3E'" />
            <div class="product-info">
              <div class="product-title">${product.title}</div>
              <div class="product-price">${product.price}</div>
            </div>
          </div>
        `;
      }).join('');

      updateCount();
      updatePageInfo();
    }

    function toggleSelect(index) {
      if (selectedIds.has(index)) {
        selectedIds.delete(index);
      } else {
        selectedIds.add(index);
      }
      updateCount();
    }

    function selectAll() {
      selectedIds = new Set(Array.from({ length: products.length }, (_, i) => i));
      renderProducts();
    }

    function unselectAll() {
      selectedIds.clear();
      renderProducts();
    }

    function invertSelection() {
      const allIds = new Set(Array.from({ length: products.length }, (_, i) => i));
      selectedIds = new Set([...allIds].filter(id => !selectedIds.has(id)));
      renderProducts();
    }

    function deleteSelected() {
      if (selectedIds.size === 0) return;
      
      const selectedArray = Array.from(selectedIds).sort((a, b) => b - a);
      selectedArray.forEach(index => {
        products.splice(index, 1);
      });
      
      selectedIds.clear();
      currentPage = 1;
      renderProducts();
    }

    function updateCount() {
      document.getElementById('totalCount').textContent = `数据预览（共${products.length}条）`;
      document.getElementById('selectedCount').textContent = `已选择${selectedIds.size}条`;
    }

    function updatePageInfo() {
      const totalPages = Math.max(1, Math.ceil(products.length / pageSize));
      const startItem = products.length === 0 ? 0 : (currentPage - 1) * pageSize + 1;
      const endItem = Math.min(currentPage * pageSize, products.length);
      
      document.getElementById('pageInfo').textContent = `第${currentPage}/${totalPages}页（${startItem}-${endItem}）`;
      
      document.getElementById('firstPageBtn').disabled = currentPage === 1;
      document.getElementById('prevPageBtn').disabled = currentPage === 1;
      document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
      document.getElementById('lastPageBtn').disabled = currentPage >= totalPages;
    }

    function goToFirstPage() {
      currentPage = 1;
      renderProducts();
    }

    function goToPrevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderProducts();
      }
    }

    function goToNextPage() {
      const totalPages = Math.ceil(products.length / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        renderProducts();
      }
    }

    function goToLastPage() {
      currentPage = Math.max(1, Math.ceil(products.length / pageSize));
      renderProducts();
    }

    function exportData() {
      const csvContent = [
        ['标题', '图片链接', '售价'],
        ...products.map(p => [p.title, p.imageUrl, p.price])
      ].map(row => row.map(cell => {
        if (typeof cell === 'string' && cell.includes(',')) {
          return `"${cell}"`;
        }
        return cell;
      }).join(',')).join('\n');
      
      const blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', 'temu_products.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    window.onload = loadProducts;
  </script>
</body>
</html>
