<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外贸获取器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="star-icon">★</span>
      <h1>外贸获取器</h1>
    </div>
    
    <div class="section">
      <h2 class="section-title">获取页面</h2>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="pageType" value="searchGoods" checked>
          <span>搜索商品</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="pageType" value="selected">
          <span>为您精选</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="pageType" value="storeGoods">
          <span>店铺商品</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="pageType" value="searchGood">
          <span>搜索好物</span>
        </label>
      </div>
    </div>
    
    <div class="section">
      <h2 class="section-title">翻页次数</h2>
      <input type="number" id="pageCount" class="input-field" placeholder="请输入翻页次数" min="1" value="1">
    </div>
    
    <div class="section">
      <h2 class="section-title">翻页延迟（秒）</h2>
      <div class="delay-inputs">
        <div class="delay-item">
          <label>起始时间</label>
          <input type="number" id="delayStart" class="input-field small" placeholder="起始" min="0" value="1">
        </div>
        <div class="delay-item">
          <label>结束时间</label>
          <input type="number" id="delayEnd" class="input-field small" placeholder="结束" min="0" value="3">
        </div>
      </div>
    </div>
    
    <div class="section">
      <button id="filterBtn" class="filter-btn"><span class="filter-icon">🔍</span><span>筛选条件</span></button>
    </div>
    
    <div class="button-group">
      <button id="startBtn" class="btn primary">开始获取</button>
      <button id="previewBtn" class="btn">预览</button>
    </div>
    <div class="button-group">
      <button id="clearBtn" class="btn">清空</button>
      <button id="exportBtn" class="btn primary">导出</button>
    </div>
    
    <div class="status-bar">
      <div class="status-item">
        <span class="status-label">获取状态：</span>
        <span id="status" class="status-value">未开始</span>
      </div>
      <div class="status-item">
        <span class="status-label">已获取：</span>
        <span id="count" class="status-value">0</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
