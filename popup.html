<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北斗店铺助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="star-icon">★</span>
      <h1>北斗店铺助手</h1>
    </div>
    
    <div class="section">
      <h2 class="section-title">获取页面</h2>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="pageType" value="searchGoods" checked>
          <span>搜索商品</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="pageType" value="selected">
          <span>为您精选</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="pageType" value="storeGoods">
          <span>店铺商品</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="pageType" value="searchGood">
          <span>搜索好物</span>
        </label>
      </div>
    </div>
    
    <div class="section" id="searchKeywordSection">
      <h2 class="section-title">搜索关键词</h2>
      <input type="text" id="searchKeyword" class="input-field" placeholder="在商品标题中搜索（可选）">
    </div>
    
    <div class="section">
      <h2 class="section-title">翻页次数</h2>
      <input type="number" id="pageCount" class="input-field" placeholder="请输入翻页次数" min="1" value="1">
    </div>
    
    <div class="section">
      <h2 class="section-title">翻页延迟（秒）</h2>
      <div class="delay-inputs">
        <div class="delay-item">
          <label>起始时间</label>
          <input type="number" id="delayStart" class="input-field small" placeholder="起始" min="0" value="1">
        </div>
        <div class="delay-item">
          <label>结束时间</label>
          <input type="number" id="delayEnd" class="input-field small" placeholder="结束" min="0" value="3">
        </div>
      </div>
    </div>
    
    <div class="section">
      <button id="filterBtn" class="filter-btn"><span class="filter-icon">🔍</span><span>筛选条件</span></button>
    </div>
    
    <div class="button-group">
      <button id="startBtn" class="btn primary">开始获取</button>
      <button id="previewBtn" class="btn">预览</button>
    </div>
    <div class="button-group">
      <button id="clearBtn" class="btn">清空</button>
      <button id="exportBtn" class="btn primary">导出</button>
    </div>
    
    <div class="progress-section">
      <div class="progress-item">
        <div class="progress-header">
          <span class="progress-label">翻页进度</span>
          <span id="pageProgressText" class="progress-text">0/0</span>
        </div>
        <div class="progress-bar-container">
          <div id="pageProgressBar" class="progress-bar"></div>
        </div>
        <span id="pageStatus" class="progress-status">未开始</span>
      </div>
      
      <div class="progress-item">
        <div class="progress-header">
          <span class="progress-label">获取进度</span>
          <span id="fetchProgressText" class="progress-text">0 件</span>
        </div>
        <div class="progress-bar-container">
          <div id="fetchProgressBar" class="progress-bar"></div>
        </div>
        <span id="fetchStatus" class="progress-status">未开始</span>
      </div>
      
      <div class="progress-item">
        <div class="progress-header">
          <span class="progress-label">导出进度</span>
          <span id="exportProgressText" class="progress-text">0/0</span>
        </div>
        <div class="progress-bar-container">
          <div id="exportProgressBar" class="progress-bar"></div>
        </div>
        <span id="exportStatus" class="progress-status">未开始</span>
      </div>
    </div>
  </div>
  <script src="jszip.min.js"></script>
  <script src="FileSaver.min.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
